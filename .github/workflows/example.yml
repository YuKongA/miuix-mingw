name: Build Example App

on:
  push:
    branches: ["mingwX64"]
    paths-ignore:
      - "README.md"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Build mingwX64 release
        run: ./gradlew :example:mingw:linkReleaseExecutableMingwX64 --no-configuration-cache
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Miuix-windows-x64
          path: example/mingw/build/bin/mingwX64/releaseExecutable/
          archive: true
