name: Build Tests

on:
  push:
    branches: ["mingwX64"]
    paths-ignore:
      - "README.md"
  pull_request:
    branches: ["mingwX64"]
    paths-ignore:
      - "README.md"

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v6
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Run mingwX64 tests
        run: ./gradlew mingwX64Test --no-configuration-cache
